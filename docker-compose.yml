version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: ./wait-for-it.sh mysql:3306 -- ./docker-entrypoint.sh
    ports:
      - 8000:8000
    depends_on:
      - redis
      - mysql
    restart: on-failure
    environment:
      - DJANGO_SETTINGS_MODULE=storefront.settings.dev
      - SECRET_KEY=django-insecure-13p)axebk7x&91cylaxo*+6rnid%vtozwig+mnurj4!-x7#eq(
      - MYSQL_DATABASE=storefront3
      - MYSQLUSER=root
      - MYSQLPASSWORD=MyPassword
      - MYSQLHOST=mysql
      - MYSQLPORT=3306
      - DJANGO_SUPERUSER_EMAIL=admin@example.com
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_PASSWORD=admin1234
    volumes:
      - .:/app

  mysql:
    image: mysql:8.0
    ports:
      - 3306:3306
    restart: always
    environment:
      - MYSQL_DATABASE=storefront3
      - MYSQL_ROOT_PASSWORD=MyPassword
    volumes:
      - mysqldata:/var/lib/mysql

  redis:
    image: redis:6.2-alpine
    ports:
      - 6379:6379
    restart: always
    volumes:
      - redisdata:/data

  smtp4dev:
    image: rnwood/smtp4dev:v3
    ports:
      - 5000:80
      - 25:25
    restart: always

  celery:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: ./wait-for-it.sh mysql:3306 -- celery -A storefront.celery worker --pool=solo --loglevel=info
    depends_on:
      - redis
      - mysql
    environment:
      - DJANGO_SETTINGS_MODULE=storefront.settings.dev
      - MYSQL_DATABASE=storefront3
      - MYSQLUSER=root
      - MYSQLPASSWORD=MyPassword
      - MYSQLHOST=mysql
      - MYSQLPORT=3306
      - CELERY_BROKER_URL=redis://redis:6379/1
    volumes:
      - .:/app

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: ./wait-for-it.sh redis:6379 -- celery -A storefront beat --loglevel=info
    depends_on:
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=storefront.settings.dev
      - MYSQL_DATABASE=storefront3
      - MYSQLUSER=root
      - MYSQLPASSWORD=MyPassword
      - MYSQLHOST=mysql
      - MYSQLPORT=3306
      - CELERY_BROKER_URL=redis://redis:6379/1 
    volumes:
      - .:/app

  flower:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: ./wait-for-it.sh redis:6379 -- celery -A storefront flower
    depends_on:
      - web
      - redis
      - celery
    environment:
      - DJANGO_SETTINGS_MODULE=storefront.settings.dev
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_BACKEND=redis://redis:6379/1
    ports:
      - 5555:5555

  tests:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: ./wait-for-it.sh mysql:3306 -- ptw
    depends_on:
      - redis
      - mysql
    tty: true
    environment:
      - DJANGO_SETTINGS_MODULE=storefront.settings.dev
      - MYSQL_DATABASE=storefront3
      - MYSQLUSER=root
      - MYSQLPASSWORD=MyPassword
      - MYSQLHOST=mysql
      - MYSQLPORT=3306
    volumes:
      - .:/app

volumes:
  mysqldata:
  redisdata:
